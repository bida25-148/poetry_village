<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book a Poet - Poetry Village</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
 
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
 
<nav class="navbar navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="index.html">Poetry Village 💜</a>
    </div>
</nav>
 
<section class="page-header text-center">
    <div class="container">
        <h1>Book a Poet</h1>
        <p>Select your preferred voice for the event.</p>
    </div>
</section>
 
<section class="container py-5">
 
    <!-- STEP 1: Select Poet -->
    <h4 class="mb-4 text-center">Choose a Poet</h4>
 
    <div class="row g-4 mb-5">
 
        <div class="col-md-4">
            <div class="poet-select" onclick="selectPoet('Kgato Hope Mosweu')">
                <img src="Images/WhatsApp Image 2026-02-25 at 11.17.43.jpeg" class="img-fluid rounded-circle mb-3">
                <h5>Kgato Hope Mosweu</h5>
                <p class="status available">Available</p>
            </div>
        </div>
 
        <div class="col-md-4">
            <div class="poet-select" onclick="selectPoet('Oratile Precious Poonyane')">
                <img src="Images/WhatsApp Image 2026-02-25 at 11.18.25.jpeg" class="img-fluid rounded-circle mb-3">
                <h5>Oratile Precious Poonyane</h5>
                <p class="status busy">Currently Booked</p>
            </div>
        </div>
 
        <div class="col-md-4">
            <div class="poet-select" onclick="selectPoet('Kebakaone Olebogeng')">
                <img src="Images/WhatsApp Image 2026-02-25 at 12.01.34.jpeg" class="img-fluid rounded-circle mb-3">
                <h5>Kebakaone Olebogeng</h5>
                <p class="status available">Available</p>
            </div>
        </div>
 
    </div>
 
    <!-- STEP 2: Booking Form -->
    <div id="bookingForm" style="display:none;">
 
        <h4 class="mb-3 text-center">Event Details</h4>
 
        <form class="custom-form">
 
            <input type="text" id="selectedPoet"
            class="form-control mb-3"
            readonly>
 
            <input type="text"
            class="form-control mb-3"
            placeholder="Event Name" required>
 
            <input type="date"
            class="form-control mb-3" required>
 
            <input type="text"
            class="form-control mb-3"
            placeholder="Location" required>
 
            <textarea class="form-control mb-3"
            rows="4"
            placeholder="Event Description"></textarea>
 
            <button class="btn btn-main w-100">
                Submit Booking Request
            </button>
 
        </form>
    </div>
 
</section>
 
<script>
function selectPoet(name) {
    document.getElementById("bookingForm").style.display = "block";
    document.getElementById("selectedPoet").value = "Booking: " + name;
    window.scrollTo({ top: document.getElementById("bookingForm").offsetTop - 100, behavior: 'smooth' });
}
</script>
 
</body>
</html>
