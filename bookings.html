<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bookings - Poetry Village</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="index.html">Poetry Village</a>
  </div>
</nav>

<div class="container mt-5">
    <h2>Book a Poet</h2>
    <p>If you are organizing an event, you can request a poet here.</p>

    <form onsubmit="bookingMessage(event)">
        <div class="mb-3">
            <label>Event Name</label>
            <input type="text" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Date</label>
            <input type="date" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Details</label>
            <textarea class="form-control" rows="4"></textarea>
        </div>

        <button class="btn btn-custom">Send Request</button>
    </form>

    <p id="bookingConfirm" class="mt-3"></p>
</div>

<footer>
    <p>© 2026 A Village Built With Intention By Kgato M</p>
</footer>

<script>
function bookingMessage(event){
    event.preventDefault();
    document.getElementById("bookingConfirm").innerText =
        "Your booking request has been sent to the village.";
}
</script>

</body>
</html
