<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mentor Center - Poetry Village</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
 
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
 
<nav class="navbar navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="index.html">Poetry Village 💜</a>
    </div>
</nav>
 
<section class="page-header text-center">
    <div class="container">
        <h1>Mentor Center</h1>
        <p>Guidance for poets who want to grow.</p>
    </div>
</section>
 
<section class="container py-5 text-center">
 
    <p class="mb-4">
        Request one-on-one guidance from experienced poets in the village.
    </p>
 
    <button class="btn btn-main mb-4" onclick="showForm()">
        Request Mentorship
    </button>
 
    <!-- Hidden Form -->
    <div id="mentorForm" style="display:none;">
        <form class="custom-form">
 
            <input type="text" class="form-control mb-3"
            placeholder="Your Name" required>
 
            <select class="form-control mb-3">
                <option>Writing Mentorship</option>
                <option>Performance Coaching</option>
                <option>Publishing Guidance</option>
            </select>
 
            <textarea class="form-control mb-3"
            rows="4" placeholder="What do you need help with?"></textarea>
 
            <button class="btn btn-main w-100">
                Submit Request
            </button>
 
        </form>
    </div>
 
</section>
 
<script>
function showForm() {
    document.getElementById("mentorForm").style.display = "block";
}
</script>
 
</body>
</html>
