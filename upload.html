<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload Your Poem - Poetry Village</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="index.html">Poetry Village 💜</a>
    </div>
</nav>

<section class="page-header text-center">
    <div class="container">
        <h1>Upload Your Poem</h1>
        <p>Let your words exist beyond your notebook.</p>
    </div>
</section>

<section class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <form class="custom-form" onsubmit="submitPoem(event)">

                <input type="text" class="form-control mb-3" placeholder="Your Name" required>

                <input type="text" class="form-control mb-3" placeholder="Poem Title" required>

                <textarea class="form-control mb-3" rows="8" placeholder="Write your poem here..." required></textarea>

                <button class="btn btn-main w-100">Submit to the Village</button>

            </form>

            <p id="confirmation" class="mt-3 text-center"></p>

        </div>
    </div>
</section>

<script>
function submitPoem(event){
    event.preventDefault();
    document.getElementById("confirmation").innerText =
    "Your poem has been submitted successfully.";
}
</script>

</body>
</html>
